name: Update Card Database

on:
  # Run every Monday at 06:00 UTC (after Limitless updates for new sets)
  schedule:
    - cron: "0 6 * * 1"

  # Allow triggering manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: "Scrape mode"
        required: true
        default: "new-only"
        type: choice
        options:
          - new-only      # Only scrape sets not yet in cards.json (fast, default)
          - full          # Re-scrape everything (use when parser was fixed)
          - sets          # Specific sets only — fill in 'sets' below
      sets:
        description: "Space-separated set codes (only used when mode=sets, e.g. OP15 ST21)"
        required: false
        default: ""

jobs:
  update-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours — enough for a full scrape of all sets

    permissions:
      contents: write      # needed to commit cards.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper (new-only, scheduled run)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'new-only')
        run: python scrape.py --new-only --out cards.json

      - name: Run scraper (full re-scrape)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
        run: python scrape.py --out cards.json

      - name: Run scraper (specific sets)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'sets'
        run: python scrape.py --sets ${{ inputs.sets }} --out cards.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet cards.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated cards.json
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Count how many cards are now in the file
          CARD_COUNT=$(python -c "import json; data=json.load(open('cards.json')); print(len(data))")

          git add cards.json
          git commit -m "chore: update cards.json — ${CARD_COUNT} cards [skip ci]"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "cards.json is already up to date — nothing to commit."
