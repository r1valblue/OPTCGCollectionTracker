name: Update card database

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Fetch card data
        run: |
          cat << 'SCRIPT' > fetch_cards.js
          const { chromium } = require('playwright');
          const fs = require('fs');

          // We fetch every card individually per set to guarantee we get ALL rarities
          // including base art, parallel, secret rare etc. — not just the highest rarity.
          // The bulk endpoints return one entry per card number (highest rarity only).
          // Per-set filtered endpoints return all variants when limit is high enough.

          const MAIN_SETS = [
            'OP01','OP02','OP03','OP04','OP05','OP06','OP07','OP08',
            'OP09','OP10','OP11','OP12','OP13','OP14','OP15',
            'EB01','EB02','EB03','EB04','PRB01','PRB02'
          ];
          const ST_SETS = [
            'ST01','ST02','ST03','ST04','ST05','ST06','ST07','ST08','ST09','ST10',
            'ST11','ST12','ST13','ST14','ST15','ST16','ST17','ST18','ST19','ST20',
            'ST21','ST22','ST23','ST24','ST25','ST26','ST27','ST28'
          ];

          const VARIANT_RE = /(_p\d+|_r\d+|_s\d+|_jp\d+)$/i;

          function norm(d) {
            const id = (d.card_set_id||d.card_id||d.id||'').toUpperCase().trim();
            const name = (d.card_name||d.name||'').trim();
            if (!id || !name) return null;
            const baseId = id.replace(VARIANT_RE, '');
            const rawSet = d.set_id || '';
            const set = rawSet.replace(/-/g,'').toUpperCase() || baseId.split('-')[0];
            // Build image URL — use API-provided one if available, else construct from official site
            const imgId = (d.card_image_id || id).toUpperCase();
            const image = d.card_image || `https://en.onepiece-cardgame.com/images/cardlist/card/${imgId}.png`;
            return {
              id, baseId, name, set,
              rarity:    d.rarity || '',
              color:     d.card_color || d.color || '',
              type:      d.card_type  || d.type  || '',
              cost:      String(d.card_cost    || d.cost    || ''),
              power:     String(d.card_power   || d.power   || ''),
              counter:   String(d.counter_amount || d.counter || ''),
              attribute: d.attribute || '',
              subRaw:    (d.sub_types || d.subtypes || '').trim(),
              effect:    d.card_text || d.card_effect || d.effect || '',
              trigger:   d.trigger_effect || d.trigger || '',
              image,
            };
          }

          async function fetchPage(page, url) {
            try {
              const res = await page.goto(url, { waitUntil: 'networkidle', timeout: 45000 });
              if (!res || !res.ok()) { console.warn('  HTTP', res?.status(), url); return []; }
              const text = await page.evaluate(() => document.body.innerText);
              let data;
              try { data = JSON.parse(text); } catch {
                const m = text.match(/\[[\s\S]*\]/);
                if (m) { try { data = JSON.parse(m[0]); } catch { return []; } }
                else return [];
              }
              return Array.isArray(data) ? data : (data.results || []);
            } catch(e) { console.warn('  Error:', e.message); return []; }
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
            });
            const page = await context.newPage();
            // db keyed by full card ID (including _p1 suffix) — never overwrite
            const db = {};

            // Fetch main sets with high limit to capture all rarities per set
            for (const setId of MAIN_SETS) {
              const url = `https://optcgapi.com/api/sets/filtered/?set_id=${setId}&limit=500`;
              console.log('Fetching set:', setId);
              const items = await fetchPage(page, url);
              let n = 0;
              items.forEach(d => {
                const c = norm(d);
                if (c && !db[c.id]) { db[c.id] = c; n++; }
                // Also ensure base ID entry exists (in case API only returned variants)
                if (c && c.id !== c.baseId && !db[c.baseId]) {
                  db[c.baseId] = { ...c, id: c.baseId, name: c.name.replace(/\s*\([^)]*(?:parallel|alt art)[^)]*\)\s*$/i,'').trim() || c.name };
                }
              });
              console.log(' ', n, 'new cards (total:', Object.keys(db).length + ')');
              await new Promise(r => setTimeout(r, 800));
            }

            // Fetch starter decks
            for (const setId of ST_SETS) {
              const url = `https://optcgapi.com/api/decks/filtered/?set_id=${setId}&limit=200`;
              console.log('Fetching deck:', setId);
              const items = await fetchPage(page, url);
              let n = 0;
              items.forEach(d => {
                const c = norm(d);
                if (c && !db[c.id]) { db[c.id] = c; n++; }
                if (c && c.id !== c.baseId && !db[c.baseId]) {
                  db[c.baseId] = { ...c, id: c.baseId, name: c.name.replace(/\s*\([^)]*(?:parallel|alt art)[^)]*\)\s*$/i,'').trim() || c.name };
                }
              });
              console.log(' ', n, 'new cards (total:', Object.keys(db).length + ')');
              await new Promise(r => setTimeout(r, 500));
            }

            // Fetch promos
            console.log('Fetching promos...');
            const promos = await fetchPage(page, 'https://optcgapi.com/api/allPromoCards/');
            let pn = 0;
            promos.forEach(d => { const c = norm(d); if (c && !db[c.id]) { db[c.id]=c; pn++; } });
            console.log(' ', pn, 'promo cards (total:', Object.keys(db).length + ')');

            await browser.close();

            if (!Object.keys(db).length) {
              console.error('No cards fetched — aborting');
              process.exit(1);
            }

            const cards = Object.values(db);
            fs.writeFileSync('cards.json', JSON.stringify({
              generated: new Date().toISOString(),
              count: cards.length,
              cards
            }));
            console.log('Done. Written', cards.length, 'cards to cards.json');
          })();
          SCRIPT
          node fetch_cards.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet cards.json; then
            echo "No changes"
          else
            COUNT=$(node -e "console.log(require('./cards.json').count)")
            git add cards.json
            git commit -m "chore: update card database (${COUNT} cards) [skip ci]"
            git push
          fi
