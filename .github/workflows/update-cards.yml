name: Update Card Database
 
on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: "Scrape mode"
        required: true
        default: "new-only"
        type: choice
        options:
          - new-only
          - full
 
jobs:
  update-cards:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours for a full scrape
 
    permissions:
      contents: write
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
 
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
 
      - name: Run scraper (new-only)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'new-only')
        run: python scrape.py --new-only --out cards.json
 
      - name: Run scraper (full)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
        run: python scrape.py --out cards.json
 
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet cards.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
 
      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CARD_COUNT=$(python -c "import json; print(len(json.load(open('cards.json'))))")
          git add cards.json
          git commit -m "chore: update cards.json — ${CARD_COUNT} cards [skip ci]"
          git push
 
      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "cards.json is already up to date."
